# Example customer requirement (RFQ). In the full tool the intake agent produces
# this from a plain-language conversation; here it is a config the engine reads.

application: agricultural_drone
spec_c_rate: 3.0                  # peak discharge stress (e.g. takeoff)

# Hard targets the design must meet (constraints).
targets:
  min_specific_energy_Wh_kg: 240
  min_rate_capability: 0.50       # keep >=50% of capacity at the peak rate
  max_temp_rise_C: 45

# What this application values, used to weight the score among feasible designs.
# A drone weights energy density; storage would weight lifetime instead.
weights:
  specific_energy: 1.0
  rate_capability: 0.6
  temp_rise: 0.4
